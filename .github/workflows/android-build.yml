name: Android CI/CD

on:
  push:
    branches: [ main, feature/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Use Node.js 24 for actions

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      run: ./gradlew :app:testDebugUnitTest --stacktrace

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: app/build/test-results/

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: openosd-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: openosd-release
        path: app/build/outputs/apk/release/app-release.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')  # Only on version tags
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: openosd-release
        path: artifacts/

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/app-release.apk
        name: OpenOSD v${{ steps.version.outputs.VERSION }}
        body: |
          ## OpenOSD v${{ steps.version.outputs.VERSION }}

          ### Features
          - Instant 0ms lag Telnet push updates
          - Visual speaker layout (overhead view)
          - Full audio format names (DOLBY ATMOS, DTS:X MSTR, etc.)
          - Three display modes (STANDARD, INFO, EXTENDED)
          - Three scale options (SMALL, MEDIUM, LARGE)
          - Modern glassy UI design

          ### Installation
          1. Download `app-release.apk`
          2. Sideload to Android TV/Fire TV
          3. Grant overlay permission (ADB required for Fire TV)
          4. Configure AVR IP address
          5. Start OSD service

          ### Requirements
          - Android 6.0+ (API 22)
          - Denon AVR with Telnet support (port 23)
          - Overlay permission

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed setup instructions.
        draft: false
        prerelease: false
