<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOSD - Interactive Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #4fc3f7 0%, #81d4fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        select, input[type="range"] {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            min-width: 150px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:hover, select:focus {
            background: rgba(255, 255, 255, 0.18);
            outline: none;
            border-color: rgba(79, 195, 247, 0.6);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(79, 195, 247, 0.4) inset,
                        0 0 20px rgba(79, 195, 247, 0.2);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4fc3f7;
            border-radius: 50%;
            cursor: pointer;
        }

        .preview-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        .tv-frame {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 3px solid #333;
            border-radius: 8px;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        .stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.1em;
            color: #4fc3f7;
            font-weight: 600;
        }

        .github-link {
            text-align: center;
            margin-top: 30px;
        }

        .github-link a {
            color: #4fc3f7;
            text-decoration: none;
            font-weight: 500;
            padding: 12px 24px;
            background: rgba(79, 195, 247, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 12px;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(79, 195, 247, 0.1),
                        0 0 0 1px rgba(79, 195, 247, 0.2) inset;
        }

        .github-link a:hover {
            background: rgba(79, 195, 247, 0.25);
            border-color: rgba(79, 195, 247, 0.6);
            box-shadow: 0 8px 32px rgba(79, 195, 247, 0.3),
                        0 0 0 1px rgba(79, 195, 247, 0.4) inset,
                        0 0 40px rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OpenOSD Interactive Preview</h1>
        <p class="subtitle">See exactly how the OSD will look on your TV - all display modes and scales</p>

        <div class="controls">
            <div class="control-group">
                <label for="displayMode">Display Mode</label>
                <select id="displayMode">
                    <option value="STANDARD">STANDARD - Volume only</option>
                    <option value="INFO">INFO - Volume + Source/Mode</option>
                    <option value="EXTENDED">EXTENDED - Full details + Speakers</option>
                </select>
            </div>

            <div class="control-group">
                <label for="scale">Scale</label>
                <select id="scale">
                    <option value="0.75">SMALL (75%)</option>
                    <option value="1.0" selected>MEDIUM (100%)</option>
                    <option value="1.3">LARGE (130%)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="volume">Volume: <span id="volumeValue">45</span></label>
                <input type="range" id="volume" min="0" max="98" value="45">
            </div>

            <div class="control-group">
                <label for="muted">
                    <input type="checkbox" id="muted"> Muted
                </label>
            </div>
        </div>

        <div class="preview-container">
            <div class="tv-frame" id="tvFrame">
                <canvas id="osdCanvas" width="1920" height="1080"></canvas>
            </div>
        </div>

        <div class="info">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Resolution</div>
                    <div class="stat-value">1920×1080</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Volume OSD Size</div>
                    <div class="stat-value" id="volumeSize">200×36dp</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Info OSD Size</div>
                    <div class="stat-value" id="infoSize">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Screen Coverage</div>
                    <div class="stat-value" id="coverage">~1.5%</div>
                </div>
            </div>
        </div>

        <div class="github-link">
            <a href="https://github.com/st0nebyte/OpenOSD" target="_blank">
                ⭐ View on GitHub
            </a>
        </div>
    </div>

    <script>
        // Apple Glassmorphism Colors (upgraded from OSDView.kt)
        const COLORS = {
            BG: 'rgba(20, 25, 35, 0.7)',           // Lighter, more transparent
            BG_GLOW: 'rgba(79, 195, 247, 0.05)',   // Subtle blue glow
            BORDER: 'rgba(255, 255, 255, 0.25)',   // Brighter border
            BORDER_INNER: 'rgba(255, 255, 255, 0.1)', // Inner highlight
            ACCENT: 'rgba(79, 195, 247, 0.6)',     // Brighter accent
            TEXT: 'rgba(255, 255, 255, 0.95)',     // Slightly brighter text
            TEXT_DIM: 'rgba(255, 255, 255, 0.6)',  // Brighter dim text
            TEXT_MUTE: 'rgba(255, 96, 96, 0.9)',   // Brighter mute
            BAR_BG: 'rgba(255, 255, 255, 0.15)',   // Brighter bar background
            BAR_FILL: 'rgba(129, 212, 250, 0.8)',  // Brighter, more vibrant fill
            SHADOW: 'rgba(0, 0, 0, 0.3)'           // Outer shadow
        };

        const canvas = document.getElementById('osdCanvas');
        const ctx = canvas.getContext('2d');
        const density = 2; // Simulate Android density (mdpi = 1, xhdpi = 2, etc.)

        // Controls
        const displayModeSelect = document.getElementById('displayMode');
        const scaleSelect = document.getElementById('scale');
        const volumeSlider = document.getElementById('volume');
        const volumeValueSpan = document.getElementById('volumeValue');
        const mutedCheckbox = document.getElementById('muted');

        function dp(value, scaleFactor) {
            return value * density * scaleFactor;
        }

        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const a = hex.length === 9 ? parseInt(hex.slice(7, 9), 16) / 255 : 1;
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        function drawVolumeOSD(scaleFactor, volume, muted) {
            const w = dp(200, scaleFactor);
            const h = dp(36, scaleFactor);
            const x = (canvas.width - w) / 2;
            const y = canvas.height - dp(80, scaleFactor);
            const radius = dp(10, scaleFactor);

            // 1. Outer glow/shadow (glassmorphism depth)
            ctx.shadowColor = COLORS.SHADOW;
            ctx.shadowBlur = dp(20, scaleFactor);
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = dp(8, scaleFactor);

            ctx.fillStyle = COLORS.BG;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();

            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 2. Subtle blue glow (glassmorphism accent)
            ctx.fillStyle = COLORS.BG_GLOW;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();

            // 3. Outer border
            ctx.strokeStyle = COLORS.BORDER;
            ctx.lineWidth = dp(1.5, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.stroke();

            // 4. Inner highlight (top edge for glass effect)
            ctx.strokeStyle = COLORS.BORDER_INNER;
            ctx.lineWidth = dp(1, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x + dp(1, scaleFactor), y + dp(1, scaleFactor),
                         w - dp(2, scaleFactor), h - dp(2, scaleFactor), radius - dp(1, scaleFactor));
            ctx.stroke();

            const pad = dp(12, scaleFactor);

            // VOL/MUTE label with slight glow
            ctx.fillStyle = muted ? COLORS.TEXT_MUTE : COLORS.TEXT_DIM;
            ctx.font = `500 ${dp(9, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            if (muted) {
                ctx.shadowColor = 'rgba(255, 96, 96, 0.5)';
                ctx.shadowBlur = dp(4, scaleFactor);
            }
            ctx.fillText(muted ? 'MUTE' : 'VOL', x + pad, y + dp(5, scaleFactor));
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;

            // Volume bar
            const barX = x + pad + dp(38, scaleFactor);
            const barW = w - pad - dp(38, scaleFactor) - dp(42, scaleFactor);
            const barH = dp(8, scaleFactor);
            const barY = y + (h - barH) / 2;
            const barRadius = dp(4, scaleFactor);

            // Bar background (glassy)
            ctx.fillStyle = COLORS.BAR_BG;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, barRadius);
            ctx.fill();

            // Bar fill with gradient (glassmorphism)
            const fillW = (barW * (volume / 98));
            if (fillW > 2) {
                const gradient = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
                gradient.addColorStop(0, 'rgba(79, 195, 247, 0.9)');
                gradient.addColorStop(1, 'rgba(129, 212, 250, 0.9)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(barX, barY, fillW, barH, barRadius);
                ctx.fill();

                // Subtle glow on bar
                ctx.shadowColor = 'rgba(79, 195, 247, 0.4)';
                ctx.shadowBlur = dp(6, scaleFactor);
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            // Volume value with subtle glow
            ctx.fillStyle = COLORS.TEXT;
            ctx.font = `600 ${dp(13, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'right';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            ctx.shadowBlur = dp(2, scaleFactor);
            const volValue = volume - 80; // Convert to dB
            const volString = volValue % 1 === 0 ? volValue.toString() : volValue.toFixed(1);
            ctx.fillText(volString, x + w - pad, y + dp(9, scaleFactor));
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }

        function drawInfoOSD(displayMode, scaleFactor) {
            const x = dp(24, scaleFactor);
            const y = dp(24, scaleFactor);
            const w = dp(280, scaleFactor);
            const blockHeight = dp(displayMode === 'EXTENDED' ? 140 : 70, scaleFactor);
            const radius = dp(12, scaleFactor);

            // 1. Outer glow/shadow (glassmorphism depth)
            ctx.shadowColor = COLORS.SHADOW;
            ctx.shadowBlur = dp(20, scaleFactor);
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = dp(8, scaleFactor);

            ctx.fillStyle = COLORS.BG;
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.fill();

            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 2. Subtle blue glow (glassmorphism accent)
            ctx.fillStyle = COLORS.BG_GLOW;
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.fill();

            // 3. Outer border
            ctx.strokeStyle = COLORS.BORDER;
            ctx.lineWidth = dp(1.5, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.stroke();

            // 4. Inner highlight (top edge for glass effect)
            ctx.strokeStyle = COLORS.BORDER_INNER;
            ctx.lineWidth = dp(1, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x + dp(1, scaleFactor), y + dp(1, scaleFactor),
                         w - dp(2, scaleFactor), blockHeight - dp(2, scaleFactor), radius - dp(1, scaleFactor));
            ctx.stroke();

            const pad = dp(12, scaleFactor);
            let currentY = y + dp(16, scaleFactor);

            // Source + Sound Mode
            ctx.fillStyle = hexToRgba(COLORS.TEXT);
            ctx.font = `500 ${dp(11, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('Fire TV • DOLBY ATMOS', x + pad, currentY);
            currentY += dp(18, scaleFactor);

            // Signal + Digital + Tech Info
            ctx.fillStyle = hexToRgba(COLORS.TEXT_DIM);
            ctx.font = `${dp(9, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.fillText('HDMI • AUTO • DRC:AUTO', x + pad, currentY);
            currentY += dp(20, scaleFactor);

            // Compact speaker display (EXTENDED mode only)
            if (displayMode === 'EXTENDED') {
                drawCompactSpeakers(x + pad, currentY, w - pad * 2, scaleFactor);
            }
        }

        function drawCompactSpeakers(x, y, maxWidth, scaleFactor) {
            let currentY = y;

            // Front Speakers
            ctx.fillStyle = hexToRgba(COLORS.TEXT_DIM);
            ctx.font = `${dp(7, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText('FRONT SPEAKERS', x, currentY);
            currentY += dp(12, scaleFactor);
            currentY = drawSpeakerRow(x, currentY, ['FL', 'C', 'FR'], scaleFactor);
            currentY += dp(8, scaleFactor);

            // Surround + Sub
            currentY = drawSpeakerRow(x, currentY, ['SL', 'SR', 'SW'], scaleFactor);
        }

        function drawSpeakerRow(startX, y, speakers, scaleFactor) {
            let x = startX;
            const boxW = dp(24, scaleFactor);
            const boxH = dp(16, scaleFactor);
            const spacing = dp(6, scaleFactor);
            const radius = dp(4, scaleFactor);

            speakers.forEach(code => {
                // Speaker box with glassmorphism
                // 1. Subtle shadow
                ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                ctx.shadowBlur = dp(4, scaleFactor);
                ctx.shadowOffsetY = dp(2, scaleFactor);

                ctx.fillStyle = COLORS.ACCENT;
                ctx.beginPath();
                ctx.roundRect(x, y, boxW, boxH, radius);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // 2. Inner glow
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = dp(0.5, scaleFactor);
                ctx.beginPath();
                ctx.roundRect(x + dp(1, scaleFactor), y + dp(1, scaleFactor),
                             boxW - dp(2, scaleFactor), boxH - dp(2, scaleFactor), radius - dp(1, scaleFactor));
                ctx.stroke();

                // 3. Label with subtle glow
                ctx.fillStyle = COLORS.TEXT;
                ctx.font = `700 ${dp(8, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(79, 195, 247, 0.5)';
                ctx.shadowBlur = dp(3, scaleFactor);
                ctx.fillText(code, x + boxW / 2, y + boxH / 2);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;

                x += boxW + spacing;
            });

            return y + boxH + dp(4, scaleFactor);
        }

        function render() {
            const displayMode = displayModeSelect.value;
            const scaleFactor = parseFloat(scaleSelect.value);
            const volume = parseInt(volumeSlider.value);
            const muted = mutedCheckbox.checked;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background gradient (simulating TV content)
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw "Your Content Here" text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.font = '48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Your Content Here (1920×1080)', canvas.width / 2, canvas.height / 2);

            // Always draw volume OSD
            drawVolumeOSD(scaleFactor, volume, muted);

            // Draw info OSD if INFO or EXTENDED mode
            if (displayMode === 'INFO' || displayMode === 'EXTENDED') {
                drawInfoOSD(displayMode, scaleFactor);
            }

            // Update stats
            updateStats(displayMode, scaleFactor);
        }

        function updateStats(displayMode, scaleFactor) {
            const volumeW = Math.round(200 * scaleFactor);
            const volumeH = Math.round(36 * scaleFactor);
            document.getElementById('volumeSize').textContent = `${volumeW}×${volumeH}dp`;

            if (displayMode === 'STANDARD') {
                document.getElementById('infoSize').textContent = '—';
            } else if (displayMode === 'INFO') {
                const infoW = Math.round(280 * scaleFactor);
                const infoH = Math.round(70 * scaleFactor);
                document.getElementById('infoSize').textContent = `${infoW}×${infoH}dp`;
            } else {
                const infoW = Math.round(280 * scaleFactor);
                const infoH = Math.round(140 * scaleFactor);
                document.getElementById('infoSize').textContent = `${infoW}×${infoH}dp`;
            }

            // Calculate screen coverage
            const volumeArea = volumeW * volumeH;
            let totalArea = volumeArea;
            if (displayMode === 'INFO') {
                totalArea += Math.round(280 * scaleFactor) * Math.round(70 * scaleFactor);
            } else if (displayMode === 'EXTENDED') {
                totalArea += Math.round(280 * scaleFactor) * Math.round(140 * scaleFactor);
            }
            const screenArea = 1920 * 1080;
            const coverage = ((totalArea / screenArea) * 100).toFixed(1);
            document.getElementById('coverage').textContent = `~${coverage}%`;
        }

        // Event listeners
        displayModeSelect.addEventListener('change', render);
        scaleSelect.addEventListener('change', render);
        volumeSlider.addEventListener('input', () => {
            volumeValueSpan.textContent = volumeSlider.value;
            render();
        });
        mutedCheckbox.addEventListener('change', render);

        // Initial render
        render();
    </script>
</body>
</html>
