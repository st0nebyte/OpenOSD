<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOSD - Interactive Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23667eea;stop-opacity:1" /><stop offset="100%" style="stop-color:%23764ba2;stop-opacity:1" /></linearGradient></defs><rect width="1920" height="1080" fill="url(%23g)"/></svg>') center/cover no-repeat;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Alternative backgrounds - uncomment to try */
        /* body { background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="%23000"/><rect x="0" y="0" width="1920" height="1080" fill="url(%23pattern)"/><defs><pattern id="pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="%23ffffff" opacity="0.1"/></pattern></defs></svg>') center/cover; } */

        .container {
            max-width: 1920px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 0.5px rgba(255, 255, 255, 0.15) inset;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        select, input[type="range"] {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            min-width: 150px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3),
                        0 0 0 0.5px rgba(255, 255, 255, 0.15) inset;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:hover, select:focus {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.3) inset;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4fc3f7;
            border-radius: 50%;
            cursor: pointer;
        }

        .preview-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        .tv-frame {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 3px solid #333;
            border-radius: 8px;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        }

        .stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.1em;
            color: #fff;
            font-weight: 600;
        }

        .github-link {
            text-align: center;
            margin-top: 30px;
        }

        .github-link a {
            color: #4fc3f7;
            text-decoration: none;
            font-weight: 500;
            padding: 12px 24px;
            background: rgba(79, 195, 247, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 12px;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(79, 195, 247, 0.1),
                        0 0 0 1px rgba(79, 195, 247, 0.2) inset;
        }

        .github-link a:hover {
            background: rgba(79, 195, 247, 0.25);
            border-color: rgba(79, 195, 247, 0.6);
            box-shadow: 0 8px 32px rgba(79, 195, 247, 0.3),
                        0 0 0 1px rgba(79, 195, 247, 0.4) inset,
                        0 0 40px rgba(79, 195, 247, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OpenOSD Interactive Preview</h1>
        <p class="subtitle">See exactly how the OSD will look on your TV - all display modes and scales</p>

        <div class="controls">
            <div class="control-group">
                <label for="displayMode">Display Mode</label>
                <select id="displayMode">
                    <option value="STANDARD">STANDARD - Volume only</option>
                    <option value="INFO" selected>INFO - Volume + Source/Mode</option>
                    <option value="EXTENDED">EXTENDED - Same as INFO (for now)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="scale">Scale</label>
                <select id="scale">
                    <option value="0.75">SMALL (75%)</option>
                    <option value="1.0" selected>MEDIUM (100%)</option>
                    <option value="1.3">LARGE (130%)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="volumeDisplay">Volume Display</label>
                <select id="volumeDisplay">
                    <option value="db">Decibel (dB)</option>
                    <option value="absolute">Absolute (0-98)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="background">TV Background</label>
                <select id="background">
                    <option value="gradient">Gradient (Purple)</option>
                    <option value="movie">Movie Scene (Dark)</option>
                    <option value="game">Game (Bright)</option>
                    <option value="black">Black Screen</option>
                    <option value="nature">Nature Documentary</option>
                </select>
            </div>

            <div class="control-group">
                <label for="volume">Volume: <span id="volumeValue">45</span></label>
                <input type="range" id="volume" min="0" max="98" value="45">
            </div>

            <div class="control-group">
                <label for="muted">
                    <input type="checkbox" id="muted"> Muted
                </label>
            </div>

            <div class="control-group">
                <label for="source">Input Source</label>
                <select id="source">
                    <option value="Fire TV" selected>Fire TV</option>
                    <option value="GAME">GAME</option>
                    <option value="BLU-RAY">BLU-RAY</option>
                    <option value="TV">TV</option>
                    <option value="DVD">DVD</option>
                    <option value="MEDIA PLAYER">MEDIA PLAYER</option>
                    <option value="CD">CD</option>
                </select>
            </div>

            <div class="control-group">
                <label for="soundMode">Sound Mode</label>
                <select id="soundMode">
                    <option value="DOLBY ATMOS" selected>DOLBY ATMOS</option>
                    <option value="DOLBY SURROUND">DOLBY SURROUND</option>
                    <option value="DTS">DTS</option>
                    <option value="STEREO">STEREO</option>
                    <option value="DIRECT">DIRECT</option>
                    <option value="MULTI CH IN">MULTI CH IN</option>
                </select>
            </div>
        </div>

        <div class="info">
            <div class="stat" style="margin-bottom: 15px; max-width: 600px; margin-left: auto; margin-right: auto;">
                <div class="stat-label">Active Trigger</div>
                <div class="stat-value" id="triggerStatus">—</div>
            </div>
        </div>

        <div class="preview-container">
            <div class="tv-frame" id="tvFrame">
                <canvas id="osdCanvas" width="1920" height="1080"></canvas>
            </div>
        </div>

        <div class="info">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Resolution</div>
                    <div class="stat-value">1920×1080</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Volume OSD Size</div>
                    <div class="stat-value" id="volumeSize">200×36dp</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Info OSD Size</div>
                    <div class="stat-value" id="infoSize">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Design</div>
                    <div class="stat-value">Apple tvOS Style</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Screen Coverage</div>
                    <div class="stat-value" id="coverage">~1.5%</div>
                </div>
            </div>
        </div>

        <div class="github-link">
            <a href="https://github.com/st0nebyte/OpenOSD" target="_blank">
                ⭐ View on GitHub
            </a>
        </div>
    </div>

    <script>
        // Apple tvOS Glassmorphism - Neutral Grey with High Contrast
        const COLORS = {
            BG: 'rgba(30, 30, 35, 0.85)',              // Dark grey, more opaque for readability
            BG_GLOW: 'rgba(255, 255, 255, 0.02)',      // Subtle white glow (not blue!)
            BORDER: 'rgba(255, 255, 255, 0.3)',        // Clear white border
            BORDER_INNER: 'rgba(255, 255, 255, 0.12)', // Subtle inner highlight
            ACCENT: 'rgba(200, 200, 205, 0.5)',        // Neutral grey accent for speakers
            TEXT: 'rgba(255, 255, 255, 1.0)',          // Full white for max readability
            TEXT_DIM: 'rgba(255, 255, 255, 0.75)',     // Readable dim text
            TEXT_MUTE: 'rgba(255, 100, 100, 1.0)',     // Bright red for mute
            BAR_BG: 'rgba(255, 255, 255, 0.2)',        // Visible bar background
            BAR_FILL: 'rgba(255, 255, 255, 0.85)',     // White bar fill (Apple style)
            SHADOW: 'rgba(0, 0, 0, 0.5)'               // Stronger shadow for depth
        };

        const canvas = document.getElementById('osdCanvas');
        const ctx = canvas.getContext('2d');
        const density = 2; // Simulate Android density (mdpi = 1, xhdpi = 2, etc.)

        // Trigger simulation state
        let prevVolume = 45;
        let prevMuted = false;
        let prevSource = 'Fire TV';
        let prevSoundMode = 'DOLBY ATMOS';

        let showVolumeOSD = false;
        let showInfoOSD = false;
        let volumeTimer = null;
        let infoTimer = null;
        let currentTrigger = null;
        let remainingTime = 0;

        // OSDTrigger constants (matching AVRState.kt)
        const TRIGGERS = {
            VOLUME:     { timeoutMs: 3000, showVolume: true,  showInfo: false, persistWhileMuted: false },
            MUTE:       { timeoutMs: 0,    showVolume: true,  showInfo: true,  persistWhileMuted: true },
            UNMUTE:     { timeoutMs: 350,  showVolume: false, showInfo: false, persistWhileMuted: false },
            SOURCE:     { timeoutMs: 5000, showVolume: false, showInfo: true,  persistWhileMuted: false },
            SOUND_MODE: { timeoutMs: 5000, showVolume: false, showInfo: true,  persistWhileMuted: false },
        };

        // Controls
        const displayModeSelect = document.getElementById('displayMode');
        const scaleSelect = document.getElementById('scale');
        const volumeDisplaySelect = document.getElementById('volumeDisplay');
        const backgroundSelect = document.getElementById('background');
        const volumeSlider = document.getElementById('volume');
        const volumeValueSpan = document.getElementById('volumeValue');
        const mutedCheckbox = document.getElementById('muted');
        const sourceSelect = document.getElementById('source');
        const soundModeSelect = document.getElementById('soundMode');
        const triggerStatusSpan = document.getElementById('triggerStatus');

        // Background images
        const backgrounds = {
            gradient: 'url("data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'1920\' height=\'1080\'><defs><linearGradient id=\'g\' x1=\'0%\' y1=\'0%\' x2=\'100%\' y2=\'100%\'><stop offset=\'0%\' style=\'stop-color:%23667eea;stop-opacity:1\' /><stop offset=\'100%\' style=\'stop-color:%23764ba2;stop-opacity:1\' /></linearGradient></defs><rect width=\'1920\' height=\'1080\' fill=\'url(%23g)\'/></svg>")',
            movie: 'linear-gradient(135deg, rgba(20,20,25,1) 0%, rgba(30,25,35,1) 100%)',
            game: 'linear-gradient(135deg, rgba(40,80,120,1) 0%, rgba(60,100,140,1) 100%)',
            black: 'linear-gradient(135deg, rgba(10,10,10,1) 0%, rgba(15,15,15,1) 100%)',
            nature: 'linear-gradient(135deg, rgba(20,60,40,1) 0%, rgba(40,80,60,1) 100%)'
        };

        function dp(value, scaleFactor) {
            return value * density * scaleFactor;
        }

        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const a = hex.length === 9 ? parseInt(hex.slice(7, 9), 16) / 255 : 1;
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        function drawVolumeOSD(scaleFactor, volume, muted, volumeDisplayMode) {
            const w = dp(200, scaleFactor);
            const h = dp(36, scaleFactor);
            const x = (canvas.width - w) / 2;
            const y = canvas.height - dp(80, scaleFactor);
            const radius = dp(10, scaleFactor);

            // 1. Outer glow/shadow (glassmorphism depth)
            ctx.shadowColor = COLORS.SHADOW;
            ctx.shadowBlur = dp(20, scaleFactor);
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = dp(8, scaleFactor);

            ctx.fillStyle = COLORS.BG;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();

            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 2. Subtle blue glow (glassmorphism accent)
            ctx.fillStyle = COLORS.BG_GLOW;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();

            // 3. Outer border
            ctx.strokeStyle = COLORS.BORDER;
            ctx.lineWidth = dp(1.5, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.stroke();

            // 4. Inner highlight (top edge for glass effect)
            ctx.strokeStyle = COLORS.BORDER_INNER;
            ctx.lineWidth = dp(1, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x + dp(1, scaleFactor), y + dp(1, scaleFactor),
                         w - dp(2, scaleFactor), h - dp(2, scaleFactor), radius - dp(1, scaleFactor));
            ctx.stroke();

            const pad = dp(12, scaleFactor);

            // VOL/MUTE label - aligned with bar center
            ctx.fillStyle = muted ? COLORS.TEXT_MUTE : COLORS.TEXT_DIM;
            ctx.font = `600 ${dp(10, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(muted ? 'MUTE' : 'VOL', x + pad, y + h / 2);

            // Volume bar
            const barX = x + pad + dp(38, scaleFactor);
            const barW = w - pad - dp(38, scaleFactor) - dp(42, scaleFactor);
            const barH = dp(8, scaleFactor);
            const barY = y + (h - barH) / 2;
            const barRadius = dp(4, scaleFactor);

            // Bar background (glassy)
            ctx.fillStyle = COLORS.BAR_BG;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, barRadius);
            ctx.fill();

            // Bar fill - clean white (Apple style)
            const fillW = (barW * (volume / 98));
            if (fillW > 2) {
                ctx.fillStyle = COLORS.BAR_FILL;
                ctx.beginPath();
                ctx.roundRect(barX, barY, fillW, barH, barRadius);
                ctx.fill();
            }

            // Volume value - aligned with bar center
            ctx.fillStyle = COLORS.TEXT;
            ctx.font = `700 ${dp(14, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';

            let volString;
            if (volumeDisplayMode === 'absolute') {
                // Absolute mode: 0-98
                volString = volume.toString();
            } else {
                // dB mode: -80 to +18
                const volValue = volume - 80;
                volString = volValue % 1 === 0 ? volValue.toString() : volValue.toFixed(1);
            }

            ctx.fillText(volString, x + w - pad, y + h / 2);
        }

        function drawInfoOSD(displayMode, scaleFactor) {
            const x = dp(24, scaleFactor);
            const y = dp(24, scaleFactor);
            const w = dp(240, scaleFactor);  // Etwas breiter für bessere Lesbarkeit
            const blockHeight = dp(42, scaleFactor);  // Kompakt - nur eine Zeile Content
            const radius = dp(10, scaleFactor);

            // 1. Outer glow/shadow (glassmorphism depth)
            ctx.shadowColor = COLORS.SHADOW;
            ctx.shadowBlur = dp(20, scaleFactor);
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = dp(8, scaleFactor);

            ctx.fillStyle = COLORS.BG;
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.fill();

            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 2. Subtle glow (glassmorphism accent)
            ctx.fillStyle = COLORS.BG_GLOW;
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.fill();

            // 3. Outer border
            ctx.strokeStyle = COLORS.BORDER;
            ctx.lineWidth = dp(1.5, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x, y, w, blockHeight, radius);
            ctx.stroke();

            // 4. Inner highlight (top edge for glass effect)
            ctx.strokeStyle = COLORS.BORDER_INNER;
            ctx.lineWidth = dp(1, scaleFactor);
            ctx.beginPath();
            ctx.roundRect(x + dp(1, scaleFactor), y + dp(1, scaleFactor),
                         w - dp(2, scaleFactor), blockHeight - dp(2, scaleFactor), radius - dp(1, scaleFactor));
            ctx.stroke();

            // Source + Sound Mode - schön groß und lesbar (Fokus auf Audioformat!)
            ctx.fillStyle = COLORS.TEXT;
            ctx.font = `600 ${dp(11, scaleFactor)}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const source = sourceSelect.value;
            const soundMode = soundModeSelect.value;
            ctx.fillText(`${source} • ${soundMode}`, x + dp(12, scaleFactor), y + blockHeight / 2);
        }

        // Speaker grid removed for simplified design (fokus auf Audioformat)

        function detectTrigger(volume, muted, source, soundMode) {
            // Priority order: mute/unmute > volume > source > sound_mode
            if (prevMuted !== muted && muted) return 'MUTE';
            if (prevMuted !== muted && !muted) return 'UNMUTE';
            if (Math.abs(prevVolume - volume) > 0) return 'VOLUME';
            if (prevSource !== source) return 'SOURCE';
            if (prevSoundMode !== soundMode) return 'SOUND_MODE';
            return null;
        }

        function handleTrigger(trigger, muted) {
            if (!trigger) return;

            currentTrigger = trigger;
            const config = TRIGGERS[trigger];

            // UNMUTE: fade out both elements
            if (trigger === 'UNMUTE') {
                hideAll();
                updateTriggerStatus('UNMUTE (fade out)', 350);
                setTimeout(() => {
                    currentTrigger = null;
                    updateTriggerStatus(null, 0);
                }, 350);
                return;
            }

            // Show appropriate OSD elements based on trigger
            if (config.showVolume) {
                showVolumeOSDFunc(config.timeoutMs, config.persistWhileMuted && muted, trigger);
            }
            if (config.showInfo) {
                showInfoOSDFunc(config.timeoutMs, config.persistWhileMuted && muted, trigger);
            }
        }

        function showVolumeOSDFunc(timeoutMs, persistWhileMuted, trigger) {
            showVolumeOSD = true;

            // Cancel previous timer
            if (volumeTimer) {
                clearTimeout(volumeTimer);
                volumeTimer = null;
            }

            // If persistWhileMuted, don't set a timer (stays visible until unmute)
            if (!persistWhileMuted && timeoutMs > 0) {
                const startTime = Date.now();
                updateTriggerStatus(trigger, timeoutMs);

                volumeTimer = setTimeout(() => {
                    showVolumeOSD = false;
                    fadeOutIfBothHidden();
                    volumeTimer = null;
                }, timeoutMs);

                // Update countdown
                updateCountdown(trigger, startTime, timeoutMs);
            } else if (persistWhileMuted) {
                updateTriggerStatus(trigger + ' (persistent)', 0);
            }

            render();
        }

        function showInfoOSDFunc(timeoutMs, persistWhileMuted, trigger) {
            showInfoOSD = true;

            // Cancel previous timer
            if (infoTimer) {
                clearTimeout(infoTimer);
                infoTimer = null;
            }

            // If persistWhileMuted, don't set a timer (stays visible until unmute)
            if (!persistWhileMuted && timeoutMs > 0) {
                const startTime = Date.now();
                updateTriggerStatus(trigger, timeoutMs);

                infoTimer = setTimeout(() => {
                    showInfoOSD = false;
                    fadeOutIfBothHidden();
                    infoTimer = null;
                }, timeoutMs);

                // Update countdown
                updateCountdown(trigger, startTime, timeoutMs);
            } else if (persistWhileMuted) {
                updateTriggerStatus(trigger + ' (persistent)', 0);
            }

            render();
        }

        function fadeOutIfBothHidden() {
            if (!showVolumeOSD && !showInfoOSD) {
                currentTrigger = null;
                updateTriggerStatus(null, 0);
            }
            render();
        }

        function hideAll() {
            if (volumeTimer) {
                clearTimeout(volumeTimer);
                volumeTimer = null;
            }
            if (infoTimer) {
                clearTimeout(infoTimer);
                infoTimer = null;
            }
            showVolumeOSD = false;
            showInfoOSD = false;
            render();
        }

        function updateTriggerStatus(trigger, timeoutMs) {
            if (!trigger) {
                triggerStatusSpan.textContent = '—';
                return;
            }

            if (timeoutMs === 0) {
                triggerStatusSpan.textContent = trigger;
            } else {
                triggerStatusSpan.textContent = `${trigger} (${(timeoutMs / 1000).toFixed(1)}s)`;
            }
        }

        function updateCountdown(trigger, startTime, totalTimeMs) {
            const update = () => {
                const elapsed = Date.now() - startTime;
                const remaining = totalTimeMs - elapsed;

                if (remaining > 0) {
                    updateTriggerStatus(trigger, remaining);
                    requestAnimationFrame(update);
                }
            };
            requestAnimationFrame(update);
        }

        function onStateChange() {
            const volume = parseInt(volumeSlider.value);
            const muted = mutedCheckbox.checked;
            const source = sourceSelect.value;
            const soundMode = soundModeSelect.value;

            const trigger = detectTrigger(volume, muted, source, soundMode);

            if (trigger) {
                handleTrigger(trigger, muted);
            }

            // Update previous state
            prevVolume = volume;
            prevMuted = muted;
            prevSource = source;
            prevSoundMode = soundMode;

            render();
        }

        function render() {
            const displayMode = displayModeSelect.value;
            const scaleFactor = parseFloat(scaleSelect.value);
            const volumeDisplayMode = volumeDisplaySelect.value;
            const backgroundType = backgroundSelect.value;
            const volume = parseInt(volumeSlider.value);
            const muted = mutedCheckbox.checked;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background based on selection
            drawBackground(backgroundType);

            // Draw volume OSD if triggered
            if (showVolumeOSD) {
                drawVolumeOSD(scaleFactor, volume, muted, volumeDisplayMode);
            }

            // Draw info OSD if triggered AND in INFO/EXTENDED mode
            if (showInfoOSD && (displayMode === 'INFO' || displayMode === 'EXTENDED')) {
                drawInfoOSD(displayMode, scaleFactor);
            }

            // Update stats
            updateStats(displayMode, scaleFactor);
        }

        function drawBackground(type) {
            switch(type) {
                case 'movie':
                    // Dark movie scene
                    const movieGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    movieGrad.addColorStop(0, '#141419');
                    movieGrad.addColorStop(1, '#1e1923');
                    ctx.fillStyle = movieGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    // Add some fake content
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.font = '32px -apple-system';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🎬 Movie Scene', canvas.width / 2, canvas.height / 2);
                    break;

                case 'game':
                    // Bright game scene
                    const gameGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gameGrad.addColorStop(0, '#285078');
                    gameGrad.addColorStop(1, '#3c648c');
                    ctx.fillStyle = gameGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.font = '32px -apple-system';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🎮 Game Scene', canvas.width / 2, canvas.height / 2);
                    break;

                case 'black':
                    // Black screen
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    break;

                case 'nature':
                    // Nature documentary
                    const natureGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    natureGrad.addColorStop(0, '#143c28');
                    natureGrad.addColorStop(1, '#28503c');
                    ctx.fillStyle = natureGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.font = '32px -apple-system';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🌿 Nature Documentary', canvas.width / 2, canvas.height / 2);
                    break;

                default: // gradient
                    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    gradient.addColorStop(0, '#667eea');
                    gradient.addColorStop(1, '#764ba2');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.font = '32px -apple-system';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Your Content Here (1920×1080)', canvas.width / 2, canvas.height / 2);
            }
        }

        function updateStats(displayMode, scaleFactor) {
            const volumeW = Math.round(200 * scaleFactor);
            const volumeH = Math.round(36 * scaleFactor);
            document.getElementById('volumeSize').textContent = `${volumeW}×${volumeH}dp`;

            if (displayMode === 'STANDARD') {
                document.getElementById('infoSize').textContent = '—';
            } else {
                // INFO and EXTENDED now have same size (simplified design)
                const infoW = Math.round(240 * scaleFactor);
                const infoH = Math.round(42 * scaleFactor);
                document.getElementById('infoSize').textContent = `${infoW}×${infoH}dp`;
            }

            // Calculate screen coverage
            const volumeArea = volumeW * volumeH;
            let totalArea = volumeArea;
            if (displayMode === 'INFO' || displayMode === 'EXTENDED') {
                totalArea += Math.round(240 * scaleFactor) * Math.round(42 * scaleFactor);
            }
            const screenArea = 1920 * 1080;
            const coverage = ((totalArea / screenArea) * 100).toFixed(1);
            document.getElementById('coverage').textContent = `~${coverage}%`;
        }

        // Event listeners
        displayModeSelect.addEventListener('change', render);
        scaleSelect.addEventListener('change', render);
        volumeDisplaySelect.addEventListener('change', render);
        backgroundSelect.addEventListener('change', render);
        volumeSlider.addEventListener('input', () => {
            volumeValueSpan.textContent = volumeSlider.value;
            onStateChange();
        });
        mutedCheckbox.addEventListener('change', onStateChange);
        sourceSelect.addEventListener('change', onStateChange);
        soundModeSelect.addEventListener('change', onStateChange);

        // Initial render (show volume on page load to demonstrate)
        showVolumeOSD = true;
        showInfoOSD = true;
        render();
        setTimeout(() => {
            showVolumeOSD = false;
            showInfoOSD = false;
            render();
        }, 2000);
    </script>
</body>
</html>
